<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>バーコードハント3D</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html, body {
    position: fixed; overflow: hidden; width: 100%; height: 100%;
    touch-action: none; user-select: none; -webkit-user-select: none;
    -webkit-touch-callout: none; margin: 0; padding: 0;
    font-family: "BIZ UDPGothic", "Hiragino Kaku Gothic ProN", sans-serif;
    background: #1a1f2e;
  }
  #game-canvas { position: absolute; inset: 0; }
  .overlay-btn { min-width: 44px; min-height: 44px; }
  @keyframes floatUp {
    0% { transform: translate(-50%, 0) scale(1); opacity: 1; }
    100% { transform: translate(-50%, -80px) scale(1.4); opacity: 0; }
  }
  .float-money {
    position: absolute; animation: floatUp 0.9s ease-out forwards;
    font-weight: bold; color: #ffd700; text-shadow: 0 2px 6px rgba(0,0,0,.6);
    font-size: 2rem; pointer-events: none; z-index: 40;
  }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
  }
  .shake { animation: shake .3s ease-in-out infinite; }
  @keyframes popIn {
    0%{transform:scale(.6);opacity:0} 100%{transform:scale(1);opacity:1}
  }
  .pop-in { animation: popIn .25s ease-out forwards; }
  #rotate-hint { display: none; }
  @media (orientation: portrait) {
    #rotate-hint { display: flex; }
  }
</style>
</head>
<body>
<canvas id="game-canvas"></canvas>

<!-- ===== 2D UI overlay ===== -->
<div id="hud" class="absolute inset-0 pointer-events-none hidden z-20">
  <!-- top bar -->
  <div class="absolute top-0 left-0 right-0 p-3 flex items-center gap-4">
    <div class="bg-black/60 rounded-xl px-4 py-2 text-white text-xl font-bold whitespace-nowrap">
      🛒 <span id="score">0</span> 個
    </div>
    <div class="flex-1 max-w-xl">
      <div class="text-white text-sm font-bold mb-1 drop-shadow">😊 お客さんのガマン</div>
      <div class="h-6 bg-black/50 rounded-full overflow-hidden border-2 border-white/40">
        <div id="patience-bar" class="h-full rounded-full transition-colors duration-300" style="width:100%; background:#4ade80"></div>
      </div>
    </div>
    <div class="bg-black/60 rounded-xl px-4 py-2 text-white text-xl font-bold whitespace-nowrap">
      📦 <span id="item-num">1</span>/3
    </div>
  </div>
  <!-- status message -->
  <div id="status-msg" class="absolute top-24 left-1/2 -translate-x-1/2 text-white text-xl font-bold bg-indigo-600/80 rounded-full px-6 py-2 drop-shadow-lg hidden"></div>
</div>

<!-- ===== start screen ===== -->
<div id="start-screen" class="absolute inset-0 z-30 flex flex-col items-center justify-center bg-gradient-to-b from-indigo-900 to-slate-900 text-center px-6">
  <div class="text-6xl mb-3">🏪</div>
  <h1 class="text-4xl md:text-5xl font-black text-white mb-2 tracking-wide">バーコードハント3D</h1>
  <p class="text-amber-300 text-lg font-bold mb-6">〜 レジ打ち スピード勝負！ 〜</p>
  <div class="bg-white/10 rounded-2xl p-5 text-white text-left text-base md:text-lg leading-relaxed mb-8 max-w-md">
    <p>👆 商品を<b class="text-amber-300">ドラッグして回転</b></p>
    <p>📊 かくれた<b class="text-amber-300">バーコード</b>を見つけよう</p>
    <p>🔴 <b class="text-red-400">赤いレーザー</b>（正面）に向けるとスキャン！</p>
    <p>⏰ お客さんが<b class="text-red-400">怒る前に</b>3個スキャン！</p>
  </div>
  <button id="start-btn" class="overlay-btn pointer-events-auto bg-amber-400 hover:bg-amber-300 active:scale-95 text-slate-900 text-2xl font-black rounded-2xl px-12 py-4 shadow-lg transition-transform">スタート！</button>
</div>

<!-- ===== checkout overlay ===== -->
<div id="checkout-screen" class="absolute inset-0 z-30 hidden flex-col items-center justify-center bg-black/60 text-center">
  <div class="pop-in bg-white rounded-3xl px-10 py-8 shadow-2xl">
    <div class="text-5xl mb-2">💰</div>
    <div class="text-3xl font-black text-slate-800">合計 <span id="checkout-total">$20</span>！</div>
    <div class="text-xl font-bold text-emerald-600 mt-2">おつりです、ありがとうございました！</div>
  </div>
</div>

<!-- ===== game over ===== -->
<div id="gameover-screen" class="absolute inset-0 z-30 hidden flex-col items-center justify-center bg-red-950/90 text-center px-6">
  <div class="text-6xl mb-3">😡💢</div>
  <h2 class="text-5xl font-black text-red-400 mb-2 tracking-widest">CASHIER FAILURE</h2>
  <p class="text-white text-xl font-bold mb-6">お客さんが怒って帰ってしまった…</p>
  <div class="bg-white/10 rounded-2xl px-10 py-6 mb-8">
    <div class="text-amber-300 text-lg font-bold">スキャンした商品</div>
    <div class="text-white text-6xl font-black"><span id="final-score">0</span> <span class="text-3xl">個</span></div>
  </div>
  <button id="retry-btn" class="overlay-btn pointer-events-auto bg-amber-400 hover:bg-amber-300 active:scale-95 text-slate-900 text-2xl font-black rounded-2xl px-12 py-4 shadow-lg transition-transform">もう一度！</button>
</div>

<!-- ===== rotate hint ===== -->
<div id="rotate-hint" class="absolute inset-0 z-50 bg-slate-900 flex-col items-center justify-center text-white text-2xl font-bold text-center">
  <div class="text-6xl mb-4">📱↻</div>
  iPadを横向きにしてください
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

/* ============ iPad gesture prevention ============ */
['touchstart','touchmove','touchend'].forEach(ev => {
  document.addEventListener(ev, e => {
    if (e.target.closest('button')) return;
    e.preventDefault();
  }, { passive: false });
});
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('dblclick', e => e.preventDefault());

/* ============ Audio (Web Audio API) ============ */
let audioCtx = null;
function ensureAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume(); }
function beep(freq, dur, type='square', vol=0.25, when=0){
  if(!audioCtx) return;
  const t = audioCtx.currentTime + when;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g).connect(audioCtx.destination);
  o.start(t); o.stop(t + dur + 0.05);
}
function playPip(){ beep(2093, 0.12, 'square', 0.3); beep(2093, 0.08, 'square', 0.15, 0.02); }
function playShhhk(){
  if(!audioCtx) return;
  const t = audioCtx.currentTime;
  const len = 0.18, buf = audioCtx.createBuffer(1, audioCtx.sampleRate*len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const f = audioCtx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=4000; f.Q.value=1;
  const g = audioCtx.createGain(); g.gain.value = 0.35;
  src.connect(f).connect(g).connect(audioCtx.destination); src.start(t);
}
function playCheckout(){
  const notes = [523, 659, 784, 1047];
  notes.forEach((n,i)=>beep(n, 0.15, 'triangle', 0.25, i*0.1));
}
function playAngry(){ beep(180, 0.3, 'sawtooth', 0.3); beep(140, 0.5, 'sawtooth', 0.3, 0.25); }
function playGameOver(){ [400,350,300,200].forEach((n,i)=>beep(n, 0.25, 'sawtooth', 0.3, i*0.2)); }

/* ============ Three.js setup ============ */
const canvas = document.getElementById('game-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xbfe8f5);
scene.fog = new THREE.Fog(0xbfe8f5, 12, 25);

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 50);
camera.position.set(0, 2.6, 4.6);
camera.lookAt(0, 1.7, 0);

scene.add(new THREE.AmbientLight(0xffffff, 0.75));
const dl = new THREE.DirectionalLight(0xfff4e0, 1.1);
dl.position.set(3, 6, 4);
scene.add(dl);

function resize(){
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize); resize();

/* ---- store environment ---- */
const mat = (c)=>new THREE.MeshLambertMaterial({color:c});
// floor
scene.add(Object.assign(new THREE.Mesh(new THREE.PlaneGeometry(30,30), mat(0xd9cbb0)), {rotation:new THREE.Euler(-Math.PI/2,0,0)}));
// back wall + shelves (decoration)
const wall = new THREE.Mesh(new THREE.BoxGeometry(30, 8, 0.3), mat(0xf2ede2));
wall.position.set(0, 4, -6); scene.add(wall);
for(let sx=-1; sx<=1; sx+=2){
  const shelf = new THREE.Group();
  for(let i=0;i<3;i++){
    const b = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.12, 0.8), mat(0x8a9bb0));
    b.position.y = 1.2 + i*0.9; shelf.add(b);
    for(let j=0;j<5;j++){
      const p = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.5, 0.35),
        mat([0xff8c69,0x7ec8e3,0xffd166,0x90ee90,0xc39bd3][(i*5+j)%5]));
      p.position.set(-1.4 + j*0.7, 1.2 + i*0.9 + 0.31, 0);
      shelf.add(p);
    }
  }
  shelf.position.set(sx*4.5, 0, -5.5);
  scene.add(shelf);
}
// counter
const counter = new THREE.Mesh(new THREE.BoxGeometry(6, 1.3, 2.4), mat(0x5fb3a1));
counter.position.set(0, 0.65, 0.6); scene.add(counter);
const counterTop = new THREE.Mesh(new THREE.BoxGeometry(6.2, 0.12, 2.6), mat(0xf7f3e8));
counterTop.position.set(0, 1.36, 0.6); scene.add(counterTop);

/* ---- laser scanner (two posts + red beam, in front of item) ---- */
const ITEM_POS = new THREE.Vector3(0, 2.05, 1.0);
const scannerGrp = new THREE.Group();
const postMat = mat(0x3b4252);
for(const sx of [-1,1]){
  const post = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.7, 0.12), postMat);
  post.position.set(sx*1.15, -0.35+0.35, 0); // centered at beam height
  scannerGrp.add(post);
  const base = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.08, 0.3), postMat);
  base.position.set(sx*1.15, -0.35, 0);
  scannerGrp.add(base);
}
const beamMat = new THREE.MeshBasicMaterial({color:0xff2222, transparent:true, opacity:0.85});
const beam = new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.05, 0.05), beamMat);
scannerGrp.add(beam);
scannerGrp.position.set(0, 2.0, 1.85); // just in front of the item, beam at barcode height
scene.add(scannerGrp);
// laser direction: beam looks toward -Z (into the item). Barcode must face +Z (toward camera/scanner).
const SCAN_DIR = new THREE.Vector3(0, 0, 1);

/* ---- barcode texture ---- */
function makeBarcodeTexture(){
  const c = document.createElement('canvas'); c.width = 128; c.height = 96;
  const g = c.getContext('2d');
  g.fillStyle = '#ffffff'; g.fillRect(0,0,128,96);
  g.fillStyle = '#000000';
  let x = 10;
  while(x < 118){
    const w = 2 + Math.floor(Math.random()*5);
    g.fillRect(x, 10, w, 60);
    x += w + 2 + Math.floor(Math.random()*4);
  }
  g.font = 'bold 14px monospace';
  const num = String(Math.floor(Math.random()*9e11)+1e11);
  g.fillText(num.slice(0,12), 14, 88);
  const t = new THREE.CanvasTexture(c);
  return t;
}

/* ---- product generators ---- */
function makeMilkCarton(){
  const grp = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.0, 0.6), mat(0xffffff));
  grp.add(body);
  const top = new THREE.Mesh(new THREE.ConeGeometry(0.44, 0.35, 4), mat(0x7ec8e3));
  top.position.y = 0.67; top.rotation.y = Math.PI/4; grp.add(top);
  const label = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.4, 0.62), mat(0x7ec8e3));
  label.position.y = -0.15; grp.add(label);
  return { grp, size: 0.85 };
}
function makeSodaCan(){
  const grp = new THREE.Group();
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 1.0, 12), mat([0xe63946,0x457b9d,0x9b5de5][Math.floor(Math.random()*3)]));
  grp.add(body);
  const lid = new THREE.Mesh(new THREE.CylinderGeometry(0.33, 0.35, 0.08, 12), mat(0xd8d8d8));
  lid.position.y = 0.54; grp.add(lid);
  const bottom = lid.clone(); bottom.position.y = -0.54; bottom.rotation.x = Math.PI; grp.add(bottom);
  return { grp, size: 0.8 };
}
function makeSnackBox(){
  const grp = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.6, 0.35), mat([0xffb703,0xfb8500,0x06d6a0][Math.floor(Math.random()*3)]));
  grp.add(body);
  const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.92, 0.18, 0.37), mat(0xffffff));
  grp.add(stripe);
  return { grp, size: 0.8 };
}
function makeOnigiri(){
  const grp = new THREE.Group();
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.55, 0.35, 3), mat(0xfdfdfd));
  body.rotation.x = Math.PI/2; grp.add(body);
  const nori = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.5, 0.38), mat(0x2d3319));
  nori.position.y = -0.25; grp.add(nori);
  return { grp, size: 0.85 };
}
function makeQuirky(){
  const grp = new THREE.Group();
  const geos = [new THREE.DodecahedronGeometry(0.5), new THREE.IcosahedronGeometry(0.5), new THREE.TorusKnotGeometry(0.32,0.11,48,8)];
  const body = new THREE.Mesh(geos[Math.floor(Math.random()*geos.length)], mat([0xef476f,0x118ab2,0x9b5de5,0x06d6a0][Math.floor(Math.random()*4)]));
  grp.add(body);
  return { grp, size: 0.75 };
}
const PRODUCT_MAKERS = [makeMilkCarton, makeSodaCan, makeSnackBox, makeOnigiri, makeQuirky];

let productGroup = null;   // group holding the product (rotated by touch)
let barcodeMesh = null;

function spawnProduct(){
  if(productGroup){ scene.remove(productGroup); productGroup = null; }
  const maker = PRODUCT_MAKERS[Math.floor(Math.random()*PRODUCT_MAKERS.length)];
  const { grp, size } = maker();
  // attach barcode plane at a random orientation on a sphere around the product
  const bc = new THREE.Mesh(
    new THREE.PlaneGeometry(0.42, 0.3),
    new THREE.MeshBasicMaterial({ map: makeBarcodeTexture(), side: THREE.FrontSide })
  );
  const dir = new THREE.Vector3().randomDirection();
  bc.position.copy(dir.clone().multiplyScalar(size * 0.62));
  bc.lookAt(dir.clone().multiplyScalar(2));
  bc.rotateZ(Math.random()*Math.PI*2);
  grp.add(bc);
  barcodeMesh = bc;
  // random initial spin so barcode is hidden
  grp.quaternion.setFromEuler(new THREE.Euler(Math.random()*6.28, Math.random()*6.28, Math.random()*6.28));
  grp.position.copy(ITEM_POS);
  scene.add(grp);
  productGroup = grp;
  playShhhk();
}

/* ---- customer face ---- */
const customer = new THREE.Group();
const skinMat = new THREE.MeshLambertMaterial({color: 0xf5c6a0});
const head = new THREE.Mesh(new THREE.SphereGeometry(0.75, 20, 16), skinMat);
customer.add(head);
const hair = new THREE.Mesh(new THREE.SphereGeometry(0.78, 20, 12, 0, Math.PI*2, 0, Math.PI/2.4), mat(0x4a3728));
hair.position.y = 0.12; customer.add(hair);
const eyeMat = mat(0x222222);
const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.09, 10, 8), eyeMat); eyeL.position.set(-0.26, 0.08, 0.66); customer.add(eyeL);
const eyeR = eyeL.clone(); eyeR.position.x = 0.26; customer.add(eyeR);
const browMat = mat(0x3a2a1a);
const browL = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.06, 0.06), browMat); browL.position.set(-0.27, 0.3, 0.66); customer.add(browL);
const browR = browL.clone(); browR.position.x = 0.27; customer.add(browR);
const mouth = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.06, 0.06), mat(0xa04030));
mouth.position.set(0, -0.32, 0.68); customer.add(mouth);
// body
const body = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.7, 1.2, 12), mat(0x5a7bd8));
body.position.y = -1.3; customer.add(body);
customer.position.set(0, 2.6, -2.2);
scene.add(customer);
const CUSTOMER_BASE_Y = 2.6;

const SKIN_CALM = new THREE.Color(0xf5c6a0);
const SKIN_ANGRY = new THREE.Color(0xf07050);

function updateCustomerFace(anger, time){ // anger 0..1
  skinMat.color.copy(SKIN_CALM).lerp(SKIN_ANGRY, anger);
  // brows tilt inward as anger rises
  browL.rotation.z = -anger * 0.7;
  browR.rotation.z =  anger * 0.7;
  browL.position.y = 0.3 - anger*0.08;
  browR.position.y = 0.3 - anger*0.08;
  // mouth turns down / widens
  mouth.scale.x = 1 + anger*0.6;
  mouth.rotation.z = 0;
  mouth.position.y = -0.32 - anger*0.06;
  // 貧乏ゆすり: jitter grows with anger
  if(anger > 0.45){
    const amp = (anger - 0.45) * 0.18;
    customer.position.y = CUSTOMER_BASE_Y + Math.sin(time*30) * amp;
    customer.rotation.z = Math.sin(time*22) * amp * 0.5;
  } else {
    customer.position.y = CUSTOMER_BASE_Y;
    customer.rotation.z = 0;
  }
}

/* ============ Game state ============ */
const State = { TITLE:0, PLAY:1, CHECKOUT:2, OVER:3 };
let state = State.TITLE;
let score = 0;
let itemIndex = 0;          // 0..2
let customerCount = 0;
let patience = 1;           // 0..1
let patienceTime = 20;      // seconds for this customer
let alignTimer = 0;         // time barcode has been aligned
let scanCooldown = 0;
let angryWarned = false;

const $ = id => document.getElementById(id);
const hud = $('hud'), scoreEl = $('score'), itemNumEl = $('item-num'),
      barEl = $('patience-bar'), statusEl = $('status-msg');

function setStatus(text, ms=1500){
  statusEl.textContent = text;
  statusEl.classList.remove('hidden');
  clearTimeout(setStatus._t);
  setStatus._t = setTimeout(()=>statusEl.classList.add('hidden'), ms);
}

function newCustomer(){
  customerCount++;
  itemIndex = 0;
  patienceTime = Math.max(10, 21 - customerCount);
  patience = 1;
  angryWarned = false;
  itemNumEl.textContent = '1';
  spawnProduct();
  if(customerCount === 1) setStatus('👆 商品を回してバーコードを探そう！', 3000);
  else setStatus(`👤 ${customerCount}人目のお客さん！`, 1200);
}

function startGame(){
  ensureAudio();
  score = 0; customerCount = 0;
  scoreEl.textContent = '0';
  $('start-screen').style.display = 'none';
  $('gameover-screen').style.display = 'none';
  hud.classList.remove('hidden');
  state = State.PLAY;
  newCustomer();
}

function onScan(){
  score++; itemIndex++;
  scoreEl.textContent = score;
  playPip();
  // +$1 float
  const f = document.createElement('div');
  f.className = 'float-money';
  f.textContent = '+$1';
  f.style.left = '50%'; f.style.top = '38%';
  document.body.appendChild(f);
  setTimeout(()=>f.remove(), 950);
  // beam flash green
  beamMat.color.set(0x22ff66);
  setTimeout(()=>beamMat.color.set(0xff2222), 200);

  if(itemIndex >= 3){
    doCheckout();
  } else {
    itemNumEl.textContent = String(itemIndex + 1);
    scanCooldown = 0.35;
    spawnProduct();
  }
}

function doCheckout(){
  state = State.CHECKOUT;
  if(productGroup){ scene.remove(productGroup); productGroup = null; }
  playCheckout();
  $('checkout-total').textContent = '$' + (customerCount*3 + 17);
  const cs = $('checkout-screen');
  cs.style.display = 'flex';
  setTimeout(()=>{
    cs.style.display = 'none';
    if(state === State.CHECKOUT){
      state = State.PLAY;
      newCustomer();
    }
  }, 1200);
}

function gameOver(){
  state = State.OVER;
  playGameOver();
  if(productGroup){ scene.remove(productGroup); productGroup = null; }
  hud.classList.add('hidden');
  $('final-score').textContent = score;
  const go = $('gameover-screen');
  go.style.display = 'flex';
}

$('start-btn').addEventListener('click', startGame);
$('retry-btn').addEventListener('click', startGame);

/* ============ Touch rotation (trackball) ============ */
let dragging = false, lastX = 0, lastY = 0;
function pointerDown(x, y){ dragging = true; lastX = x; lastY = y; }
function pointerMove(x, y){
  if(!dragging || !productGroup || state !== State.PLAY) return;
  const dx = x - lastX, dy = y - lastY;
  lastX = x; lastY = y;
  const ROT = 0.011;
  const qx = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), dx * ROT);
  const qy = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), dy * ROT);
  productGroup.quaternion.premultiply(qx).premultiply(qy);
}
function pointerUp(){ dragging = false; }

canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; pointerDown(t.clientX, t.clientY); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); const t = e.touches[0]; pointerMove(t.clientX, t.clientY); }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); pointerUp(); }, { passive: false });
canvas.addEventListener('mousedown', e => pointerDown(e.clientX, e.clientY));
canvas.addEventListener('mousemove', e => pointerMove(e.clientX, e.clientY));
addEventListener('mouseup', pointerUp);

/* ============ Main loop ============ */
const clock = new THREE.Clock();
const _normal = new THREE.Vector3();
const _q = new THREE.Quaternion();

function animate(){
  requestAnimationFrame(animate);
  let dt = clock.getDelta();
  if(dt > 1/30) dt = 1/30;   // delta clamp for 120Hz ProMotion
  const time = clock.elapsedTime;

  // idle bobbing of beam glow
  beamMat.opacity = 0.7 + Math.sin(time*8)*0.15;

  if(state === State.PLAY){
    // patience drain
    patience -= dt / patienceTime;
    if(patience <= 0){ patience = 0; gameOver(); }
    barEl.style.width = (patience*100).toFixed(1) + '%';
    barEl.style.background = patience > 0.5 ? '#4ade80' : patience > 0.25 ? '#facc15' : '#ef4444';
    const anger = 1 - patience;
    updateCustomerFace(anger, time);
    if(anger > 0.7 && !angryWarned){
      angryWarned = true;
      playAngry();
      setStatus('💢 お客さんがイライラしてる！いそげ！', 1500);
      document.querySelector('#hud .flex-1').classList.add('shake');
      setTimeout(()=>document.querySelector('#hud .flex-1')?.classList.remove('shake'), 1500);
    }

    if(scanCooldown > 0) scanCooldown -= dt;

    // scan detection: barcode world normal vs scanner direction
    if(productGroup && barcodeMesh && scanCooldown <= 0){
      barcodeMesh.getWorldQuaternion(_q);
      _normal.set(0,0,1).applyQuaternion(_q);
      const dot = _normal.dot(SCAN_DIR);
      if(dot > 0.93){
        alignTimer += dt;
        beamMat.color.set(0xffaa00); // aiming feedback
        if(alignTimer > 0.12){
          alignTimer = 0;
          onScan();
        }
      } else {
        alignTimer = 0;
        beamMat.color.set(0xff2222);
      }
    }
  } else {
    updateCustomerFace(0, time);
  }

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
